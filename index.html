<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Yaniv Scorekeeper</title>
    <meta
      name="description"
      content="Fast, offline scorekeeper for live games of Yaniv — handles Assaf, the +30 penalty and the 100-halving rule so you can focus on the cards."
    />
    <!-- vite-plugin-pwa injects the manifest link and theme-color at build time.
         These two are declared explicitly: iOS uses apple-touch-icon for the
         home-screen icon, and the favicon is the browser-tab icon. -->
    <meta name="theme-color" content="#1f4a3d" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yaniv" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
